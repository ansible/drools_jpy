- RuleSet:
    hosts:
    - localhost
    name: GracePeriod OnceAfter Ruleset
    rules:
    - Rule:
        action:
          Action:
            action: debug
            action_args: {}
        condition:
          AllCondition:
          - EqualsExpression:
              lhs:
                Event: alert.type
              rhs:
                String: warning
        enabled: true
        name: alert_throttle
        throttle:
          once_after: 10 seconds
          group_by_attributes:
          - event.alert.host
    sources:
    - EventSource:
        name: range
        source_args:
          delay: 1
          limit: 50
        source_filters: []
        source_name: range
